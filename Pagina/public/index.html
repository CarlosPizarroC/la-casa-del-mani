<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>La Casa del Maní | Sistema</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css?v=20" />
</head>

<body>

    <!-- ===================== LOGIN (Firebase) - NO TOCAR LOOK ===================== -->
    <main class="auth" id="loginView">
        <section class="auth-card" aria-label="Ingreso a La Casa del Maní">
            <div class="brand">
                <img id="brandLogo" class="brand__logo" src="" alt="Logo La Casa del Maní" />
                <h1 class="brand__title">La Casa del Maní</h1>
                <p class="brand__subtitle">Ingreso al sistema</p>
            </div>

            <form id="loginForm" class="form" novalidate>
                <div class="field">
                    <label for="username">Usuario o correo</label>
                    <input id="username" name="username" type="email" inputmode="email" autocomplete="username"
                        placeholder="usuario@dominio.com" required />
                    <p class="field__error" id="usernameError" role="alert"></p>
                </div>

                <div class="field">
                    <label for="password">Contraseña</label>
                    <div class="password">
                        <input id="password" name="password" type="password" autocomplete="current-password"
                            placeholder="••••••••" minlength="6" required />
                        <button type="button" class="password__toggle" id="togglePassword"
                            aria-label="Mostrar contraseña" title="Mostrar/Ocultar">👁</button>
                    </div>
                    <p class="field__error" id="passwordError" role="alert"></p>
                </div>

                <div class="row">
                    <label class="checkbox">
                        <input type="checkbox" id="rememberMe" />
                        <span>Recordarme</span>
                    </label>

                    <a class="link" href="#" id="forgotPassword">¿Olvidó password?</a>
                </div>

                <button type="submit" class="btn btn--primary" id="btnLogin">
                    INICIAR SESIÓN
                </button>

                <p class="foot">
                    No tienes cuenta?
                    <a class="link" href="#" id="goRegister">Registrate</a>
                </p>

                <div class="toast" id="toastLogin" role="status" aria-live="polite"></div>
            </form>
        </section>
    </main>

    <!-- ===================== APP (PANEL) ===================== -->
    <div class="app" id="appView" hidden>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar__top">
                <div class="sidebar__brand">
                    <img id="brandLogoMini" class="sidebar__logo" src="" alt="Logo La Casa del Maní">
                    <div class="sidebar__brandText">
                        <div class="sidebar__name">La Casa del Maní</div>
                        <div class="sidebar__sub">Panel interno</div>
                    </div>
                </div>

                <!-- Botón siempre visible (incluso colapsado) -->
                <button class="hamburger" id="btnSidebar" aria-label="Ocultar/mostrar menú">☰</button>
            </div>

            <!-- (1) Eliminado el cuadro Usuario/Rol -->

            <nav class="menu" id="menu">
                <button class="mitem is-active" data-view="inicio">Inicio</button>

                <button class="mitem has-children" data-toggle="erp">
                    ERP <span class="chev">▾</span>
                </button>
                <div class="submenu" id="sub-erp">
                    <button class="sitem" data-view="erp-inventario">Inventario</button>
                    <button class="sitem" data-view="erp-pedido">Orden de Pedido</button>
                    <button class="sitem" data-view="erp-mp">Materia Prima</button>
                    <button class="sitem" data-view="erp-param">Parámetros de referencia</button>
                </div>

                <button class="mitem has-children" data-toggle="mes">
                    MES <span class="chev">▾</span>
                </button>
                <div class="submenu" id="sub-mes">
                    <button class="sitem" data-view="mes-op">Orden de Producción</button>
                    <button class="sitem" data-view="mes-aprobada">Orden Producción Aprobada</button>
                    <button class="sitem" data-view="mes-terminada">Orden Producción Terminada</button>
                </div>

                <button class="mitem" data-view="control">Sistemas de Control</button>
            </nav>

            <div class="sidebar__bottom">
                <button class="btn btn--ghost" id="btnLogout">Cerrar sesión</button>
            </div>
        </aside>

        <main class="main">
            <header class="topbar">
                <div class="topbar__left">
                    <span class="pill">La Casa del Maní</span>
                </div>

                <div class="topbar__right">
                    <div class="avatar" id="uiAvatar">LC</div>
                    <div class="topinfo">
                        <div class="topname" id="uiName">—</div>
                        <div class="toprole" id="uiRole2">—</div>
                    </div>
                </div>
            </header>

            <section class="content">
                <div id="viewRoot"></div>
                <div class="toast" id="toastApp" role="status" aria-live="polite"></div>
            </section>
        </main>
    </div>

    <script type="module" src="script.js?v=20"></script>
</body>

</html>
